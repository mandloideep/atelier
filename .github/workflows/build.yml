name: Build and push image

# Manual-only. Push to main does NOT trigger this — go to Actions tab →
# "Build and push image" → "Run workflow" to trigger from the UI, or run
# `gh workflow run build.yml` from your laptop.
on:
  workflow_dispatch:
    inputs:
      tag:
        description: "Extra tag to apply on top of `latest` and `sha-<short>` (optional)"
        required: false
        default: ""

jobs:
  build-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/mandloideep/atelier
          tags: |
            type=raw,value=latest
            type=sha,prefix=sha-
            type=raw,value=${{ inputs.tag }},enable=${{ inputs.tag != '' }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Summary
        run: |
          {
            echo "### Image pushed"
            echo '```'
            echo "${{ steps.meta.outputs.tags }}"
            echo '```'
            echo ""
            echo "Next: open Dokploy → atelier app → **Deploy**"
          } >> "$GITHUB_STEP_SUMMARY"
